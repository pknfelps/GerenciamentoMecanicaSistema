name: pipeline
on:
  push: 

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install dotnet-coverage
        run: dotnet tool install dotnet-coverage --tool-path ${{ runner.temp }}/tools

      - name: Restore dependencies
        run: dotnet restore GerenciamentoMecanicaSistema.slnx

      - name: Build
        run: dotnet build GerenciamentoMecanicaSistema.slnx --no-restore

      - name: Run Unit Tests
        run: ${{ runner.temp }}/tools/dotnet-coverage collect "dotnet test GerenciamentoMecanicaSistema.slnx --no-build --no-restore" -f xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  code-analysis:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore GerenciamentoMecanicaSistema.slnx

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: Cache SonarQube Cloud Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ runner.temp }}/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}/scanner

      - name: Sonar Cloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ${{ runner.temp }}/scanner/dotnet-sonarscanner begin /k:"pknfelps_GerenciamentoMecanicaSistema" /o:"pknfelps" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml"
          dotnet build GerenciamentoMecanicaSistema.slnx --no-restore
          ${{ runner.temp }}/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  build-and-publish:
    runs-on: ubuntu-latest
    needs: code-analysis
    steps:
      - name: Docker Login
        uses: docker/login-action@v4.4.0
        with:
          username: 'felipejesusoliveira'
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        run: docker build -t gerenciamentomecanicasistema:latest -f .\GerenciamentoMecanicaSistema\Dockerfile .

      - name: Tag Image
        run: docker image tag gerenciamentomecanicasistema:latest felipejesusoliveira/gerenciamentomecanicasistema:latest

      - name: Publish Image
        run: docker push felipejesusoliveira/gerenciamentomecanicasistema:latest
